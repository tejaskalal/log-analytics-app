
name: CI Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Build Backend Image
      - name: Build Backend Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/backend ./backend

      # Scan Image
      - name: Scan Backend Image
        run: trivy image ${{ secrets.DOCKERHUB_USERNAME }}/backend

      # Login DockerHub
      - name: Docker Login
        run: echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      # Push Image
      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/backend

      # Update GitOps Repo
      - name: Update Manifest Repo
        run: |
          git clone https://${{ secrets.GITOPS_REPO_TOKEN }}@github.com/tejaskalal/k8s-manifests.git
          cd k8s-manifests

          sed -i "s|image:.*backend.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest|" backend/deployment.yaml

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git commit -am "Update backend image"
          git push
